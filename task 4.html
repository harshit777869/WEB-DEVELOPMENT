<!DOCTYPE html>
<html>
<head>
  <title>PWA Store</title>

  <style>
    body { font-family: Arial; text-align: center; }
    .card {
      border: 1px solid #ccc;
      padding: 20px;
      margin: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>

<h2>E-Commerce PWA Demo</h2>

<div class="card">
  <p>Product 1</p>
  <button onclick="buy()">Buy</button>
</div>

<div class="card">
  <p>Product 2</p>
  <button onclick="buy()">Buy</button>
</div>

<p id="msg"></p>

<script>
function buy() {
  document.getElementById("msg").innerText =
    "Added to cart (Works Offline Simulation)";
}
</script>

</body>
</html>
